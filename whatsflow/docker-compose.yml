services:
  # API FastAPI
  api:
    build: .
    container_name: whatsflow_api
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://whatsflow:whatsflow_secure_password@postgres:5432/whatsflow
      - REDIS_URL=redis://redis:6379
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - WHATSAPP_BASE_PORT=3010
      - MAX_SESSIONS_PER_CLIENT=5
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./app:/app/app
      - /var/run/docker.sock:/var/run/docker.sock # Pour gérer les conteneurs Docker
      - ./whatsapp-engine:/whatsapp-engine # Montage du moteur WhatsApp
    networks:
      - whatsflow_network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: whatsflow_postgres
    environment:
      - POSTGRES_USER=whatsflow
      - POSTGRES_PASSWORD=whatsflow_secure_password
      - POSTGRES_DB=whatsflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - whatsflow_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatsflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: whatsflow_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - whatsflow_network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # Moteur WhatsApp Baileys
  whatsapp-engine:
    build:
      context: ./whatsapp-engine
      dockerfile: Dockerfile
    image: whatsapp-baileys-engine:latest
    container_name: whatsapp_engine_builder # Conteneur juste pour la construction, ne sera pas démarré par compose
    # Ce service n'est pas démarré par `docker-compose up` car il est démarré dynamiquement par l'API.
    # L'avoir ici garantit que l'image est construite lorsque nous exécutons `docker-compose build`.

    # Nginx Reverse Proxy (optionnel pour production)
    # nginx:
    #   image: nginx:alpine
    #   container_name: whatsflow_nginx
    #   ports:
    #     - "80:80"
    #     - "443:443"
    #   volumes:
    #     - ./nginx.conf:/etc/nginx/nginx.conf
    #   depends_on:
    #     - api
    #   networks:
    #     - whatsflow_network
    #   restart: unless-stopped

volumes:
  postgres_data:
  redis_data:


networks:
  whatsflow_network:
    name: whatsflow_network
    driver: bridge
